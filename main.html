<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .video-box {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }
    .video-box .video-background {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .content {
      position: absolute;
      top: 20%;
      left: 9%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5em;
      z-index: 1;
      text-align: left;
      display: none; 
    }
    #login-container {
      position: absolute;
      top: 25%;
      left: 80%;
      transform: translate(-50%, -50%);
      background-color:rgb(70, 168, 224);
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      z-index: 2;
      opacity: 0.65;
    }
    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: rgb(255, 255, 255);
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #error-message {
      color: red;
      display: none;
    }
  </style>
</head>
<body>
  <div class="video-box">
    <video class="video-background" preload="auto" loop playsinline autoplay src="source/FIREFLY.mp4" tabindex="-1" muted="muted"></video>
    <audio id="login-music" src="source/你找到我了.mp3"></audio>
    <div id="login-container">     
      <form id="login-form">
        <label for="username">你的名字：</label>
        <input type="text" id="username" name="username" required>
        <label for="password">唯一的解：</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">匹&nbsp;配</button>
      </form>
      <p id="error-message">二者命运并未纠缠</p>
    </div>
    <div class="content">
      <a href="source/月色名为温柔.html" target="_blank"><span style="color: white;">夜色名为温柔</span></a><br><br>
      <a href="source/天空与你之间.html" target="_blank"><span style="color: white;">天空与你之间</span></a><br><br>
      <a href="source/见过夏天.html"target="_blank"><span style="color: white;">见过夏天</span></a>
    </div>
  </div>
  <script>
    const users = [
      {
        username: "firefly",
        password: "trailblazer"
      },
      {
        username: "1",
        password: "1"
      }
    ];
      document.getElementById("login-form").addEventListener("submit", function(event) {
      event.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const user = users.find(user => user.username === username && user.password === password);
      if (user) {
        document.getElementById("login-container").style.display = "none";
        document.querySelector(".content").style.display = "block";
        document.getElementById("login-music").play();
      } else {
        document.getElementById("error-message").style.display = "block";
      }
    });
  </script>
</body>
</html>
